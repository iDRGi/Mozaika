services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mozaika
      POSTGRES_USER: mozaika
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mozaika"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dev

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file: .env
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - DATABASE_URL=postgres://mozaika:devpassword@postgres:5432/mozaika
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev

volumes:
  pgdata_dev:

networks:
  dev: