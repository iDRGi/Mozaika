services:
  migrate:
    build:
      context: .
      target: builder
    working_dir: /app
    command: >
      sh -c "NODE_OPTIONS='--import tsx' npx payload migrate --forceAcceptWarning"
    env_file: .env
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - media_uploads:/app/public/media
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       mozaika
      POSTGRES_USER:     mozaika
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mozaika"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl/certs:/etc/nginx/ssl:ro     # сертификаты Let's Encrypt
      - media_uploads:/var/www/media:ro
    depends_on:
      - app
    networks:
      - internal

  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    hostname: mozaika-netdata
    restart: unless-stopped
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal

volumes:
  pgdata:
  media_uploads:
  netdataconfig:
  netdatalib:
  netdatacache:

networks:
  internal:
